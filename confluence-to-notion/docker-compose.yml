services:
  jupyter:
    build: .
    ports:
      - "8888:8888"
    volumes:
      - .:/workspace
    env_file:
      - path: .env
        required: false
    restart: unless-stopped

  postgres:
    image: postgres:17
    environment:
      POSTGRES_DB: confluence
      POSTGRES_USER: confluence
      POSTGRES_PASSWORD: confluence
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8 --lc-collate=C --lc-ctype=C"
    volumes:
      - confluence-postgres-data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U confluence"]
      interval: 10s
      timeout: 5s
      retries: 5

  confluence:
    image: atlassian/confluence
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8090:8090"
      - "8091:8091"
    environment:
      JVM_MINIMUM_MEMORY: 1024m
      JVM_MAXIMUM_MEMORY: 2048m
      ATL_JDBC_URL: jdbc:postgresql://postgres:5432/confluence
      ATL_JDBC_USER: confluence
      ATL_JDBC_PASSWORD: confluence
      ATL_DB_TYPE: postgresql
      # Timebomb license (10 users, expires 3h after first use)
      # Renew at: https://developer.atlassian.com/platform/marketplace/timebomb-licenses-for-testing-server-apps/
      # ATL_LICENSE_KEY: "set timebomb license here"
    volumes:
      - confluence-data:/var/atlassian/application-data/confluence
    restart: unless-stopped

volumes:
  confluence-postgres-data:
  confluence-data:
